{{- $gomemlimit := include "catalyst.GetGoLangGOMEMLIMITFromResourceLimits" (dict "limits" .Values.management.resources.limits "golimit" .Values.management.goSoftLimit) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "management.name" . }}
  labels:
    {{- include "merge.maps" (dict "base" (fromYaml (include "management.labels" .)) "overrides" .Values.management.merge.labels) | nindent 4 }}
spec:
  {{- if not .Values.management.autoscaling.enabled }}
  replicas: {{ .Values.management.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      {{- include "management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{ $baseAnns := dict "checksum/management-config" (include (print $.Template.BasePath "/management/configmap.yaml") . | sha256sum) "dapr.io/app-id" "management" "dapr.io/config" "management" }}
      {{ $overrideAnns := .Values.management.podAnnotations | default dict }}
      annotations:
        {{ include "merge.maps" (dict "base" $baseAnns "overrides" $overrideAnns) | nindent 8 }}
      labels:
        {{- include "merge.maps" (dict "base" (include "management.selectorLabels" . | fromYaml) "overrides" .Values.management.merge.selectorLabels) | nindent 8 }}
    spec:
      restartPolicy: Always
      serviceAccountName: {{ include "management.serviceAccountName" . }}
      securityContext:
        {{ include "merge.maps" (dict "base" .Values.management.podSecurityContext "overrides" .Values.management.merge.podSecurityContext) | nindent 8 }}
      {{ with .Values.global.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{ end }}
      {{- if .Values.global.waitForDaprConfig.enabled }}
      initContainers:
        {{- include "catalyst.waitForDaprConfigInitContainer" (dict "configName" "management" "context" .) | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{ include "merge.maps" (dict "base" .Values.management.securityContext "overrides" .Values.management.merge.securityContext) | nindent 12 }}
          image: {{ include "catalyst.image" (dict "image" .Values.management.image "consolidated" .Values.global.consolidated_image "global" .Values.global.image "context" .) }}
          imagePullPolicy: {{ include "catalyst.imagePullPolicy" (dict "image" .Values.management.image "consolidated" .Values.global.consolidated_image "global" .Values.global.image) }}
          command: ["./management"]
          args:
          - "--log-level={{ .Values.management.logLevel }}"
          env:
          - name: CONFIG_FILE_DIR
            value: /etc/management
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          {{- if (and $gomemlimit (ne $gomemlimit "0")) }}
          - name: GOMEMLIMIT
            value: {{ $gomemlimit }}
          {{- end }}
          {{- if and (eq .Values.global.secrets.provider "postgresql") .Values.global.secrets.postgresql.existingSecret }}
          {{- $pgSecret := .Values.global.secrets.postgresql.existingSecret }}
          {{- $pgKeys := .Values.global.secrets.postgresql.existingSecretKeys }}
          - name: SECRETS_POSTGRESQL_CONNECTION_STRING
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.connection_string | default "connection_string" }}
                optional: true
          - name: SECRETS_POSTGRESQL_KEK_PROVIDER
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.kek_provider | default "kek_provider" }}
                optional: true
          - name: SECRETS_POSTGRESQL_PRIMARY_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.primary_encryption_key | default "primary_encryption_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_PRIMARY_KEY_VERSION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.primary_key_version | default "primary_key_version" }}
                optional: true
          - name: SECRETS_POSTGRESQL_SECONDARY_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.secondary_encryption_key | default "secondary_encryption_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_SECONDARY_KEY_VERSION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.secondary_key_version | default "secondary_key_version" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_KMS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_kms_key_id | default "aws_kms_key_id" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_REGION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_region | default "aws_region" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_access_key | default "aws_access_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_secret_access_key | default "aws_secret_access_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_USE_AWS_IAM
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.use_aws_iam | default "use_aws_iam" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_ASSUME_ROLE_ARN
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_assume_role_arn | default "aws_assume_role_arn" }}
                optional: true
          - name: SECRETS_POSTGRESQL_MAX_CONNS
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.max_conns | default "max_conns" }}
                optional: true
          - name: SECRETS_POSTGRESQL_TIMEOUT
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.timeout | default "timeout" }}
                optional: true
          {{- end }}
          {{- if .Values.management.extraEnvs }}
          {{- toYaml .Values.management.extraEnvs | nindent 10 }}
          {{- end }}
          {{- include "inject.patch" (dict "patch" .Values.management.patch.env "indent" 10) }}
          {{- if .Values.management.patch.ports }}
          ports:
          {{- include "inject.patch" (dict "patch" .Values.management.patch.ports "indent" 10) }}
          {{- end }}
          resources:
            {{- if .Values.management.merge.resources }}
              {{- toYaml .Values.management.merge.resources | nindent 12 }}
            {{- else }}
              {{- toYaml .Values.management.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
          - name: management-config
            mountPath: /etc/management
          - name: sentry-identity-token
            mountPath: /var/run/secrets/dapr.io/sentrytoken
            readOnly: true
          - name: trust-bundle
            mountPath: /var/run/secrets/diagrid.io/trust
            readOnly: true
          {{- include "inject.patch" (dict "patch" .Values.management.patch.volumeMounts "indent" 10) }}
        {{- include "inject.patch" (dict "patch" .Values.management.patch.containers "indent" 6) }}
      volumes:
      - name: management-config
        configMap:
          name: {{ include "management.name" . }}-config
      - name: trust-bundle
        configMap:
          name: ca-certificates-bundle
      - name: sentry-identity-token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: dapr.io/sentry
              expirationSeconds: 7200
              path: token
      {{- include "inject.patch" (dict "patch" .Values.management.patch.volumes "indent" 6) }}
      nodeSelector:
        {{- include "catalyst.nodeSelector" (dict "shared" .Values.shared.scheduling "component" .Values.management "componentMerge" .Values.management.merge) | nindent 8 }}
      affinity:
        {{- include "catalyst.affinity" (dict "shared" .Values.shared.scheduling "component" .Values.management "componentMerge" .Values.management.merge) | nindent 8 }}
      tolerations:
        {{- include "catalyst.tolerations" (dict "shared" .Values.shared.scheduling "component" .Values.management "componentMerge" .Values.management.merge) | nindent 8 }}
