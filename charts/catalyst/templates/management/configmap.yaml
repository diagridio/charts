{{- include "management.validateValues" . -}}
{{- $configMap := deepCopy .Values.management.config -}}
{{- $_ := set $configMap "control_plane_namespace" .Values.global.control_plane_namespace -}}
{{- $_ := set $configMap "control_plane_url" .Values.global.control_plane_url -}}
{{- $_ := set $configMap "control_plane_http_url" .Values.global.control_plane_http_url -}}
{{- $_ := set $configMap "control_plane_http_insecure" .Values.global.control_plane_http_insecure -}}
{{- $_ := set $configMap "sentry" .Values.global.sentry -}}
{{- $_ := set $configMap "nats" .Values.global.nats -}}
{{- $_ := set $configMap "secretsprovider" .Values.global.secrets.provider -}}
{{- $_ := set $configMap "secrets_redis" .Values.global.secrets.redis -}}
{{- $_ := set $configMap "secrets_aws_secretmanager" .Values.global.secrets.aws -}}
{{- if and (eq .Values.global.secrets.provider "postgresql") (not .Values.global.secrets.postgresql.existingSecret) -}}
  {{- $_ := set $configMap "secrets_postgresql" .Values.global.secrets.postgresql -}}
{{- end -}}
{{- $_ := set $configMap "featureflags" .Values.global.featureflags -}}
{{- /* Derive connect-only access to the shared region database (db_region) from
       the agent's managed Postgres credentials, so no separate management value
       is required: the agent provisions db_region with these same region master
       credentials, and management only ever connects to it (no DDL).

       This MUST mirror the agent's own resolveManagedPostgresqlConfig
       (services/catalyst/agent/internal/boot/regiondb.go): the agent prefers the
       shared self-hosted Postgres (only present when
       default_managed_state_store_type == postgresql-shared-selfhosted) and
       otherwise falls back to project.external_postgresql whenever it is enabled
       — independent of the state-store type (e.g. external Postgres configured
       for the scheduler's managed-postgresql backend). We therefore key the
       self-hosted branch off the state-store type and the external branch off
       external_postgresql.enabled, in that precedence order.

       An explicit management.config.region_postgresql, if set, always wins. */ -}}
{{- /* Consume the shared resolver so this derivation sees the SAME resolved
       state store the agent ConfigMap emits (the friendly global.postgresql
       surface, or a legacy passthrough), never the raw .Values. */ -}}
{{- $resolved := include "catalyst.resolvedInfra" . | fromYaml -}}
{{- $ss := $resolved.stateStore -}}
{{- $extPg := $ss.external | default dict -}}
{{- if not (hasKey $configMap "region_postgresql") -}}
  {{- /* Self-hosted path (e.g. onebox), checked first to match the agent's
         preference. Rather than hardcoding the agent's Bitnami coordinates here,
         we only propagate the managed state store type: management derives the
         host/port/username/secret/password-key in code from the shared
         conventions (services/catalyst/pkg/sharedpostgresql), the same source
         the agent uses. This keeps the two from drifting. */ -}}
  {{- if eq $ss.type "postgresql-shared-selfhosted" -}}
    {{- $_ := set $configMap "region_postgresql" (dict
        "enabled" true
        "managed_state_store_type" $ss.type
      ) -}}
  {{- /* External path: the agent uses project.external_postgresql whenever it is
         enabled. Its existing-secret carries the full connection tuple (keys:
         host, port, username, password), which management reuses. When external
         Postgres is enabled but configured inline (no existing_secret_name),
         credentials can't be auto-derived here — set an explicit
         management.config.region_postgresql override instead. The region
         database name is a fixed invariant owned by the agent
         (mcpstore.RegionDatabaseName), so it is not set here. */ -}}
  {{- else if and (dig "enabled" false $extPg) (dig "existing_secret_name" "" $extPg) -}}
    {{- $_ := set $configMap "region_postgresql" (dict
        "enabled" true
        "disable_tls" (dig "disable_tls" false $extPg)
        "max_conns" (dig "max_conns" 2 $extPg)
        "existing_secret_name" $extPg.existing_secret_name
        "existing_secret_namespace" (default .Release.Namespace (dig "existing_secret_namespace" "" $extPg))
      ) -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "management.name" . }}-config
data:
  "config.yaml": |
{{ tpl (toYaml $configMap) . | indent 4 }}
