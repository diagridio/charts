apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "management.serviceAccountName" . }}
rules:
# ConfigMaps — informer (list, watch) + patch (xrs ACK annotations) + get (region details)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "patch"]
# Secrets — informer (list, watch) + CRUD on per-project/per-appid token secrets
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "delete"]
# Namespaces — get + list (project namespace lookup) + watch (project name resolver informer)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
# Leases — leader election (get-or-create, periodic update)
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]
# Dapr components — read-only (component lookup, kafka topology)
- apiGroups: ["dapr.io"]
  resources: ["components"]
  verbs: ["get", "list", "watch"]
# Dapr configurations — read-only
- apiGroups: ["dapr.io"]
  resources: ["configurations"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "management.serviceAccountName" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "management.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "management.serviceAccountName" . }}
  apiGroup: rbac.authorization.k8s.io
