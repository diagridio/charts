{{- $gomemlimit := include "catalyst.GetGoLangGOMEMLIMITFromResourceLimits" (dict "limits" .Values.agent.resources.limits "golimit" .Values.agent.goSoftLimit) }}
{{- include "agent.validateValues" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "agent.name" . }}
  labels:
    {{- include "merge.maps" (dict "base" (fromYaml (include "agent.labels" .)) "overrides" .Values.agent.merge.labels) | nindent 4 }}
spec:
  replicas: {{ .Values.agent.replicaCount }}
  selector:
    matchLabels:
      {{- include "agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/cra-agent-config: {{ include (print $.Template.BasePath "/agent/configmap.yaml") . | sha256sum }}
        dapr.io/app-id: agent
        dapr.io/config: agent
        {{ with .Values.agent.podAnnotations }}
        {{ toYaml . | nindent 8 }}
        {{ end }}
      labels:
        {{- include "agent.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Always
      serviceAccountName: {{ include "agent.serviceAccountName" . }}
      securityContext:
        {{ include "merge.maps" (dict "base" .Values.agent.podSecurityContext "overrides" .Values.agent.merge.podSecurityContext) | nindent 8 }}
      {{ with .Values.global.image.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{ end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{ include "merge.maps" (dict "base" .Values.agent.securityContext "overrides" .Values.agent.merge.securityContext) | nindent 12 }}
          image: {{ include "catalyst.image" (dict "image" .Values.agent.image "consolidated" .Values.global.consolidated_image "global" .Values.global.image "context" .) }}
          imagePullPolicy: {{ include "catalyst.imagePullPolicy" (dict "image" .Values.agent.image "consolidated" .Values.global.consolidated_image "global" .Values.global.image) }}
          command: ["./agent"]
          args:
          - "--log-level={{ .Values.agent.logLevel }}"
          env:
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
          - name: CONFIG_FILE_DIR
            value: /etc/cra-agent
          {{- if (and $gomemlimit (ne $gomemlimit "0")) }}
          - name: GOMEMLIMIT
            value: {{ $gomemlimit }}
          {{- end }}
          {{- if and (eq .Values.global.secrets.provider "postgresql") .Values.global.secrets.postgresql.existingSecret }}
          {{- $pgSecret := .Values.global.secrets.postgresql.existingSecret }}
          {{- $pgKeys := .Values.global.secrets.postgresql.existingSecretKeys }}
          - name: SECRETS_POSTGRESQL_CONNECTION_STRING
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.connection_string | default "connection_string" }}
                optional: true
          - name: SECRETS_POSTGRESQL_KEK_PROVIDER
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.kek_provider | default "kek_provider" }}
                optional: true
          - name: SECRETS_POSTGRESQL_PRIMARY_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.primary_encryption_key | default "primary_encryption_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_PRIMARY_KEY_VERSION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.primary_key_version | default "primary_key_version" }}
                optional: true
          - name: SECRETS_POSTGRESQL_SECONDARY_ENCRYPTION_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.secondary_encryption_key | default "secondary_encryption_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_SECONDARY_KEY_VERSION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.secondary_key_version | default "secondary_key_version" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_KMS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_kms_key_id | default "aws_kms_key_id" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_REGION
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_region | default "aws_region" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_access_key | default "aws_access_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_secret_access_key | default "aws_secret_access_key" }}
                optional: true
          - name: SECRETS_POSTGRESQL_USE_AWS_IAM
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.use_aws_iam | default "use_aws_iam" }}
                optional: true
          - name: SECRETS_POSTGRESQL_AWS_ASSUME_ROLE_ARN
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.aws_assume_role_arn | default "aws_assume_role_arn" }}
                optional: true
          - name: SECRETS_POSTGRESQL_MAX_CONNS
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.max_conns | default "max_conns" }}
                optional: true
          - name: SECRETS_POSTGRESQL_TIMEOUT
            valueFrom:
              secretKeyRef:
                name: {{ $pgSecret }}
                key: {{ $pgKeys.timeout | default "timeout" }}
                optional: true
          {{- end }}
          {{- /* Unified join-token env: viper resolves host.join_token from CRA_HOST_JOIN_TOKEN. */}}
          {{- /* When existingJoinTokenSecret.name is set, source from Secret. Otherwise, fall back */}}
          {{- /* to inline .Values.join_token literal. Either path makes the agent flag work. */}}
          {{- if .Values.agent.existingJoinTokenSecret.name }}
          - name: CRA_HOST_JOIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ .Values.agent.existingJoinTokenSecret.name }}
                key: {{ .Values.agent.existingJoinTokenSecret.key | default "join_token" }}
          {{- else if .Values.join_token }}
          - name: CRA_HOST_JOIN_TOKEN
            value: {{ .Values.join_token | quote }}
          {{- end }}
          {{- if .Values.agent.extraEnvs }}
          {{- toYaml .Values.agent.extraEnvs | nindent 10 }}
          {{- end }}
          {{- include "inject.patch" (dict "patch" .Values.agent.patch.env "indent" 10) }}
          livenessProbe:
            httpGet:
              path: /livez
              port: probes
            failureThreshold: 3
            periodSeconds: 10
            initialDelaySeconds: 5
          ports:
          - name: metrics
            containerPort: {{ .Values.agent.metrics.port }}
            protocol: TCP
          - name: probes
            containerPort: 8080
            protocol: TCP
          {{- if .Values.agent.patch.ports }}
          {{- include "inject.patch" (dict "patch" .Values.agent.patch.ports "indent" 10) }}
          {{- end }}
          resources:
            {{- if .Values.agent.merge.resources }}
              {{- toYaml .Values.agent.merge.resources | nindent 12 }}
            {{- else }}
              {{- toYaml .Values.agent.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
          - name: agent-config
            mountPath: /etc/cra-agent
          - name: sentry-identity-token
            mountPath: /var/run/secrets/dapr.io/sentrytoken
            readOnly: true
          {{- if or .Values.global.charts.clientCert .Values.global.charts.clientKey .Values.global.charts.customCA .Values.global.charts.existingSecret }}
          - name: charts-secret
            mountPath: /var/run/secrets/charts
            readOnly: true
          {{- end }}
          {{- include "inject.patch" (dict "patch" .Values.agent.patch.volumeMounts "indent" 10) }}
        {{- include "inject.patch" (dict "patch" .Values.agent.patch.containers "indent" 6) }}
      volumes:
      - name: agent-config
        configMap:
          name: {{ include "agent.name" . }}-config
      - name: sentry-identity-token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: dapr.io/sentry
              expirationSeconds: 7200
              path: token
      {{- if or .Values.global.charts.clientCert .Values.global.charts.clientKey .Values.global.charts.customCA .Values.global.charts.existingSecret }}
      - name: charts-secret
        secret:
          secretName: {{ include "agent.chartsSecretName" . }}
          defaultMode: 0400
      {{- end }}
      {{- include "inject.patch" (dict "patch" .Values.agent.patch.volumes "indent" 6) }}
      nodeSelector:
        {{- include "catalyst.nodeSelector" (dict "shared" .Values.shared.scheduling "component" .Values.agent "componentMerge" .Values.agent.merge) | nindent 8 }}
      affinity:
        {{- include "catalyst.affinity" (dict "shared" .Values.shared.scheduling "component" .Values.agent "componentMerge" .Values.agent.merge) | nindent 8 }}
      tolerations:
        {{- include "catalyst.tolerations" (dict "shared" .Values.shared.scheduling "component" .Values.agent "componentMerge" .Values.agent.merge) | nindent 8 }}
