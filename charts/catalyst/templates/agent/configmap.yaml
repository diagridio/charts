{{- include "agent.validateValues" . -}}
{{- $agentConfig := deepCopy .Values.agent.config -}}
{{- if .Values.join_token -}}
  {{- $_ := set $agentConfig.host "join_token" .Values.join_token -}}
{{- end -}}
{{- /* Default ingress.service.namespace to the release namespace when the
       value is empty. Marketplace deployments leave it blank in their buyer-
       side overlay (deploy/aws-marketplace/cloudformation/catalyst-values.yaml.tmpl
       in the cloudgrid repo) with a comment promising render-time resolution;
       this block fulfills that promise. */ -}}
{{- if and $agentConfig.host.ingress.service.name (not $agentConfig.host.ingress.service.namespace) -}}
  {{- $_ := set $agentConfig.host.ingress.service "namespace" .Release.Namespace -}}
{{- end -}}
{{- /* Resolve the managed data backends (Postgres state store, Dapr scheduler,
       Kafka pubsub) from the friendly global.postgresql / global.kafka /
       scheduler surface into the agent's canonical config fields. The shared
       catalyst.resolvedInfra helper (../_helpers.tpl) applies the legacy
       passthrough precedence; both this ConfigMap and the management ConfigMap
       consume it so the two cannot drift. */ -}}
{{- $resolved := include "catalyst.resolvedInfra" . | fromYaml -}}
{{- if not $agentConfig.project -}}{{- $_ := set $agentConfig "project" dict -}}{{- end -}}
{{- $_ := set $agentConfig.project "default_managed_state_store_type" $resolved.stateStore.type -}}
{{- if $resolved.stateStore.selfhosted -}}{{- $_ := set $agentConfig.project "selfhosted_postgresql" $resolved.stateStore.selfhosted -}}{{- end -}}
{{- if $resolved.stateStore.external -}}{{- $_ := set $agentConfig.project "external_postgresql" $resolved.stateStore.external -}}{{- end -}}
{{- $_ := set $agentConfig.project "default_managed_pubsub_type" $resolved.pubsub.type -}}
{{- if $resolved.pubsub.selfhosted -}}{{- $_ := set $agentConfig.project "selfhosted_kafka" $resolved.pubsub.selfhosted -}}{{- end -}}
{{- if $resolved.pubsub.external -}}{{- $_ := set $agentConfig.project "external_kafka" $resolved.pubsub.external -}}{{- end -}}
{{- /* Scheduler: translate backend_type (+ postgresql.use_global) into the agent's
       backend_type + managed_postgresql/external_postgresql, and drop the
       Helm-only `postgresql` key so it never leaks into the agent config. */ -}}
{{- if not $agentConfig.internal_dapr -}}{{- $_ := set $agentConfig "internal_dapr" dict -}}{{- end -}}
{{- if not $agentConfig.internal_dapr.scheduler -}}{{- $_ := set $agentConfig.internal_dapr "scheduler" dict -}}{{- end -}}
{{- $scheduler := $agentConfig.internal_dapr.scheduler -}}
{{- $_ := unset $scheduler "postgresql" -}}
{{- $_ := set $scheduler "backend_type" $resolved.scheduler.backend_type -}}
{{- if $resolved.scheduler.managed_postgresql -}}
  {{- $_ := set $scheduler "managed_postgresql" $resolved.scheduler.managed_postgresql -}}
{{- else -}}
  {{- $_ := unset $scheduler "managed_postgresql" -}}
{{- end -}}
{{- if $resolved.scheduler.external_postgresql -}}
  {{- $_ := set $scheduler "external_postgresql" $resolved.scheduler.external_postgresql -}}
{{- else -}}
  {{- $_ := unset $scheduler "external_postgresql" -}}
{{- end -}}
{{- /* Propagate top-level shared.scheduling so the agent applies it to every
       workload it provisions (sidecars, per-project Dapr, per-project OTel).
       Two conversions happen here to dodge viper gotchas in the agent:
         - nodeSelector map -> list-of-pairs (preserves label keys with ".")
         - affinity map    -> YAML string literal (preserves camelCase keys) */ -}}
{{- if and .Values.shared .Values.shared.scheduling -}}
  {{- $sched := dict -}}
  {{- if .Values.shared.scheduling.nodeSelector -}}
    {{- $list := list -}}
    {{- range $k, $v := .Values.shared.scheduling.nodeSelector -}}{{- $list = append $list (dict "key" $k "value" $v) -}}{{- end -}}
    {{- $_ := set $sched "node_selector" $list -}}
  {{- end -}}
  {{- if .Values.shared.scheduling.tolerations -}}{{- $_ := set $sched "tolerations" .Values.shared.scheduling.tolerations -}}{{- end -}}
  {{- if and .Values.shared.scheduling.affinity (gt (len .Values.shared.scheduling.affinity) 0) -}}{{- $_ := set $sched "affinity" (toYaml .Values.shared.scheduling.affinity) -}}{{- end -}}
  {{- if $sched -}}
    {{- $_ := set $agentConfig "shared" (dict "scheduling" $sched) -}}
  {{- end -}}
{{- end -}}
{{- /* Convert per-workload node_selector map -> list-of-pairs and affinity map -> YAML string. */ -}}
{{- range $section := list "sidecar" "internal_dapr" "otel" -}}
  {{- $cfg := index $agentConfig $section -}}
  {{- if $cfg -}}
    {{- if hasKey $cfg "node_selector" -}}
      {{- if kindIs "map" $cfg.node_selector -}}
        {{- $list := list -}}
        {{- range $k, $v := $cfg.node_selector -}}{{- $list = append $list (dict "key" $k "value" $v) -}}{{- end -}}
        {{- $_ := set $cfg "node_selector" $list -}}
      {{- end -}}
    {{- end -}}
    {{- if hasKey $cfg "affinity" -}}
      {{- if and (kindIs "map" $cfg.affinity) (gt (len $cfg.affinity) 0) -}}
        {{- $_ := set $cfg "affinity" (toYaml $cfg.affinity) -}}
      {{- else -}}
        {{- $_ := unset $cfg "affinity" -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- $_ := set $agentConfig "control_plane_namespace" .Values.global.control_plane_namespace -}}
{{- $_ := set $agentConfig "control_plane_url" .Values.global.control_plane_url -}}
{{- $_ := set $agentConfig "control_plane_http_url" .Values.global.control_plane_http_url -}}
{{- $_ := set $agentConfig "control_plane_http_insecure" .Values.global.control_plane_http_insecure -}}
{{- $_ := set $agentConfig "sentry" .Values.global.sentry -}}
{{- $_ := set $agentConfig "nats" .Values.global.nats -}}
{{- $_ := set $agentConfig "secretsprovider" .Values.global.secrets.provider -}}
{{- $_ := set $agentConfig "secrets_redis" .Values.global.secrets.redis -}}
{{- $_ := set $agentConfig "secrets_aws_secretmanager" .Values.global.secrets.aws -}}
{{- if and (eq .Values.global.secrets.provider "postgresql") (not .Values.global.secrets.postgresql.existingSecret) -}}
  {{- $_ := set $agentConfig "secrets_postgresql" .Values.global.secrets.postgresql -}}
{{- end -}}
{{- $_ := set $agentConfig "featureflags" .Values.global.featureflags -}}
{{- /* Apply global registry override to nested image configurations */ -}}
{{- if .Values.global.image.registry -}}
  {{- $_ := set $agentConfig.sidecar "image_registry" .Values.global.image.registry -}}
  {{- $_ := set $agentConfig.otel "image_registry" .Values.global.image.registry -}}
  {{- $_ := set $agentConfig.internal_dapr "container_registry" .Values.global.image.registry -}}
  {{- $_ := set $agentConfig.internal_dapr.sentry.image "registry" .Values.global.image.registry -}}
{{- end -}}
{{- /* Apply global charts configuration */ -}}
{{- if or .Values.global.charts.registry .Values.global.charts.username .Values.global.charts.password .Values.global.charts.clientCert .Values.global.charts.clientKey .Values.global.charts.customCA .Values.global.charts.existingSecret .Values.global.charts.bitnamiChartRegistry .Values.global.charts.bitnamiImageRegistry .Values.global.charts.bitnamiKafkaChartVersion .Values.global.charts.bitnamiPostgresqlChartVersion .Values.global.charts.bitnamiRedisChartVersion -}}
  {{- if not $agentConfig.artifacts -}}
    {{- $_ := set $agentConfig "artifacts" (dict) -}}
  {{- end -}}
  {{- if .Values.global.charts.registry -}}
    {{- $_ := set $agentConfig.artifacts "internal_repo_url" .Values.global.charts.registry -}}
  {{- end -}}
  {{- if .Values.global.charts.daprChartName -}}
    {{- $_ := set $agentConfig.artifacts "internal_dapr_chart_name" .Values.global.charts.daprChartName -}}
  {{- end -}}
  {{- /* Route Bitnami chart + image pulls to the AMMP ECR namespace when set; empty preserves default docker.io behavior. */ -}}
  {{- if .Values.global.charts.bitnamiChartRegistry -}}
    {{- $_ := set $agentConfig.artifacts "bitnami_chart_registry" .Values.global.charts.bitnamiChartRegistry -}}
  {{- end -}}
  {{- if .Values.global.charts.bitnamiImageRegistry -}}
    {{- $_ := set $agentConfig.artifacts "bitnami_image_registry" .Values.global.charts.bitnamiImageRegistry -}}
  {{- end -}}
  {{- /* Empty falls back to DefaultBitnami*ChartVersion in the agent. Note: per-tenant component/Chart.yaml pins a different postgresql version. */ -}}
  {{- if .Values.global.charts.bitnamiKafkaChartVersion -}}
    {{- $_ := set $agentConfig.artifacts "bitnami_kafka_chart_version" .Values.global.charts.bitnamiKafkaChartVersion -}}
  {{- end -}}
  {{- if .Values.global.charts.bitnamiPostgresqlChartVersion -}}
    {{- $_ := set $agentConfig.artifacts "bitnami_postgresql_chart_version" .Values.global.charts.bitnamiPostgresqlChartVersion -}}
  {{- end -}}
  {{- if .Values.global.charts.bitnamiRedisChartVersion -}}
    {{- $_ := set $agentConfig.artifacts "bitnami_redis_chart_version" .Values.global.charts.bitnamiRedisChartVersion -}}
  {{- end -}}
  {{- /* Registry credentials. With existingSecret the agent reads them from the */ -}}
  {{- /* secret mounted at /var/run/secrets/charts — it treats an absolute path */ -}}
  {{- /* as a file reference — so nothing sensitive is written into the ConfigMap. */ -}}
  {{- /* With inline values (no existingSecret) the literals are emitted instead. */ -}}
  {{- if .Values.global.charts.existingSecret -}}
    {{- $_ := set $agentConfig.artifacts "internal_registry_username" "/var/run/secrets/charts/username" -}}
    {{- $_ := set $agentConfig.artifacts "internal_registry_password" "/var/run/secrets/charts/password" -}}
  {{- else -}}
    {{- if .Values.global.charts.username -}}
      {{- $_ := set $agentConfig.artifacts "internal_registry_username" .Values.global.charts.username -}}
    {{- end -}}
    {{- if .Values.global.charts.password -}}
      {{- $_ := set $agentConfig.artifacts "internal_registry_password" .Values.global.charts.password -}}
    {{- end -}}
  {{- end -}}
  {{- /* mTLS cert/key/CA are always file references into the mounted secret. The */ -}}
  {{- /* agent drops any path the secret does not actually contain, so a secret */ -}}
  {{- /* holding only credentials (or only certs) works without further config. */ -}}
  {{- if or .Values.global.charts.clientCert .Values.global.charts.existingSecret -}}
    {{- $_ := set $agentConfig.artifacts "internal_repo_client_cert_file" "/var/run/secrets/charts/tls.crt" -}}
  {{- end -}}
  {{- if or .Values.global.charts.clientKey .Values.global.charts.existingSecret -}}
    {{- $_ := set $agentConfig.artifacts "internal_repo_client_key_file" "/var/run/secrets/charts/tls.key" -}}
  {{- end -}}
  {{- if or .Values.global.charts.customCA .Values.global.charts.existingSecret -}}
    {{- $_ := set $agentConfig.artifacts "internal_repo_ca_file" "/var/run/secrets/charts/ca.crt" -}}
  {{- end -}}
{{- end -}}
{{- /* Default ingress TLS secret from the gateway TLS settings when not explicitly set */ -}}
{{- if and .Values.gateway.tls.enabled (not $agentConfig.host.ingress.tls.secret.name) -}}
  {{- $_ := set $agentConfig.host.ingress.tls.secret "name" (include "gateway.tlsSecretName" . | trim) -}}
  {{- if and .Values.gateway.tls.certificates.caFile (not $agentConfig.host.ingress.tls.secret.ca_file) -}}
    {{- $_ := set $agentConfig.host.ingress.tls.secret "ca_file" .Values.gateway.tls.certificates.caFile -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "agent.name" . }}-config
data:
  "config.yaml": |
{{ tpl (toYaml $agentConfig) . | indent 4 }}
