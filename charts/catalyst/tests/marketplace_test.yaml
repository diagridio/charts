suite: Test AWS Marketplace Configuration
templates:
  - agent/deployment.yaml
  - agent/configmap.yaml
  - management/deployment.yaml
  - management/configmap.yaml
  - gateway/deployment.yaml
  - gateway/configmap.yaml
  - gateway/gateway-controlplane-configmap.yaml
  - piko/statefulset.yaml
  - piko/configmap.yaml
  - post-delete-hook.yaml

tests:
  #--------------------------------------------------------------------
  # Marketplace ECR Image Tests
  #--------------------------------------------------------------------
  - it: should use ECR registry for agent image with marketplace values
    values:
      - values/aws-marketplace.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/catalyst-all:"
        template: agent/deployment.yaml

  - it: should use ECR registry for management image with marketplace values
    values:
      - values/aws-marketplace.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/catalyst-all:"
        template: management/deployment.yaml

  - it: should use ECR registry for envoy image with marketplace values
    values:
      - values/aws-marketplace.yaml
    set:
      gateway.controlplane.xds.mtls.enabled: false
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/envoyproxy/envoy:"
        template: gateway/deployment.yaml
        documentIndex: 0

  - it: should use ECR registry for gateway controlplane image with marketplace values
    values:
      - values/aws-marketplace.yaml
    set:
      gateway.controlplane.xds.mtls.enabled: false
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/catalyst-all:"
        template: gateway/deployment.yaml
        documentIndex: 1

  - it: should use ECR registry for identity-injector image with marketplace values
    values:
      - values/aws-marketplace.yaml
    set:
      gateway.controlplane.xds.mtls.enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/catalyst-all:"
        template: gateway/deployment.yaml
        documentIndex: 0
      - equal:
          path: spec.template.spec.containers[0].name
          value: "identity-injector"
        template: gateway/deployment.yaml
        documentIndex: 0

  - it: should use ECR registry for piko image with marketplace values
    values:
      - values/aws-marketplace.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/diagrid-piko:"
        template: piko/statefulset.yaml

  - it: should use ECR registry for cleanup hook image with marketplace values
    values:
      - values/aws-marketplace.yaml
    set:
      cleanup.enabled: true
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^709825985650\\.dkr\\.ecr\\.us-east-1\\.amazonaws\\.com/diagrid/alpine/k8s:"
        template: post-delete-hook.yaml
        documentSelector:
          path: kind
          value: Job

  - it: should use ECR sidecar image_registry in agent config with marketplace values
    values:
      - values/aws-marketplace.yaml
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "image_registry: 709825985650.dkr.ecr.us-east-1.amazonaws.com/diagrid"
        template: agent/configmap.yaml

  - it: should use IfNotPresent pull policy for agent with marketplace values
    values:
      - values/aws-marketplace.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: "IfNotPresent"
        template: agent/deployment.yaml

  #--------------------------------------------------------------------
  # existingJoinTokenSecret Tests
  #--------------------------------------------------------------------
  - it: should render agent deployment with existingJoinTokenSecret (no join_token)
    values:
      - values/existing-join-token-secret.yaml
    asserts:
      - isKind:
          of: Deployment
        template: agent/deployment.yaml

  - it: should have CRA_HOST_JOIN_TOKEN env var from secret when existingJoinTokenSecret is set
    values:
      - values/existing-join-token-secret.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CRA_HOST_JOIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-join-token-secret
                key: token
        template: agent/deployment.yaml

  - it: should not pass --host.join_token CLI arg when existingJoinTokenSecret is set
    values:
      - values/existing-join-token-secret.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--host.join_token=$(CRA_HOST_JOIN_TOKEN)"
        template: agent/deployment.yaml
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--host.join_token=$(JOIN_TOKEN)"
        template: agent/deployment.yaml

  - it: should not contain join_token in configmap when existingJoinTokenSecret is set
    values:
      - values/existing-join-token-secret.yaml
    asserts:
      - notMatchRegex:
          path: data["config.yaml"]
          pattern: "join_token:"
        template: agent/configmap.yaml

  - it: should fail when neither join_token nor existingJoinTokenSecret is provided
    set:
      join_token: ""
      agent.existingJoinTokenSecret.name: ""
    asserts:
      - failedTemplate:
          errorMessage: "Either join_token or agent.existingJoinTokenSecret.name is required to deploy this chart!"
        template: agent/deployment.yaml

  - it: should succeed with join_token and no existingJoinTokenSecret
    set:
      join_token: "test-token"
    asserts:
      - isKind:
          of: Deployment
        template: agent/deployment.yaml

  - it: should contain join_token in configmap when using inline join_token
    set:
      join_token: "test-token"
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "join_token: test-token"
        template: agent/configmap.yaml

  - it: should accept both join_token and existingJoinTokenSecret simultaneously (Secret takes precedence)
    set:
      join_token: "inline-token"
      agent.existingJoinTokenSecret.name: "some-secret"
      agent.existingJoinTokenSecret.key: "token"
    asserts:
      - isKind:
          of: Deployment
        template: agent/deployment.yaml
      - matchRegex:
          path: data["config.yaml"]
          pattern: "join_token: inline-token"
        template: agent/configmap.yaml
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CRA_HOST_JOIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: some-secret
                key: token
        template: agent/deployment.yaml

  - it: should set CRA_HOST_JOIN_TOKEN env var with inline value when only join_token is provided
    set:
      join_token: "inline-token"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CRA_HOST_JOIN_TOKEN
            value: "inline-token"
        template: agent/deployment.yaml

  - it: should not set CRA_HOST_JOIN_TOKEN env var when neither path provides a value
    set:
      join_token: "test-token"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: CRA_HOST_JOIN_TOKEN
            valueFrom:
              secretKeyRef:
                name: ""
                key: ""
        template: agent/deployment.yaml

  #--------------------------------------------------------------------
  # Cleanup Hook Image Override Tests
  #--------------------------------------------------------------------
  - it: should use global registry override for cleanup hook image
    set:
      join_token: "test-token"
      cleanup.enabled: true
      global.image.registry: "my-custom-registry.io"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^my-custom-registry\\.io/alpine/k8s:"
        template: post-delete-hook.yaml
        documentSelector:
          path: kind
          value: Job

  - it: should allow direct cleanup image override
    set:
      join_token: "test-token"
      cleanup.enabled: true
      cleanup.image.registry: "direct-override.io"
      cleanup.image.repository: "my-helm"
      cleanup.image.tag: "3.14.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "direct-override.io/my-helm:3.14.0"
        template: post-delete-hook.yaml
        documentSelector:
          path: kind
          value: Job

  #--------------------------------------------------------------------
  # AMMP overlay file content tests (the actual values-aws-marketplace.yaml)
  # These verify the overlay shipped to AMMP customers, not just the
  # minimal test fixture used by the registry-override tests above.
  #--------------------------------------------------------------------
  - it: AMMP overlay should disable the post-delete cleanup hook (CFN owns lifecycle)
    set:
      join_token: "test-token"
      global.secrets.aws.region: "us-east-1"
    values:
      - ../values-aws-marketplace.yaml
    asserts:
      - hasDocuments:
          count: 0
        template: post-delete-hook.yaml

  - it: AMMP overlay should configure agent ingress to point at gateway-envoy
    set:
      join_token: "test-token"
      global.secrets.aws.region: "us-east-1"
    values:
      - ../values-aws-marketplace.yaml
    asserts:
      - matchRegex:
          path: data["config.yaml"]
          pattern: "name: gateway-envoy"
        template: agent/configmap.yaml
