suite: Test Agent Required Values Validation
templates:
  - agent/configmap.yaml

tests:
  - it: should fail agent configmap when global values are empty
    values:
      - values/empty-globals.yaml
    asserts:
      - failedTemplate:
          errorMessage: "global.control_plane_url is required!"

  - it: should fail agent configmap when secrets provider is redis but host is missing
    values:
      - values/redis-provider-no-host.yaml
    asserts:
      - failedTemplate:
          errorMessage: "global.secrets.redis.host is required when global.secrets.provider is redis!"

  - it: should fail agent configmap when secrets provider is aws.secretmanager but region is missing
    values:
      - values/aws-provider-no-region.yaml
    asserts:
      - failedTemplate:
          errorMessage: "global.secrets.aws.region is required when global.secrets.provider is aws.secretmanager!"

  - it: should fail when Postgres is disabled but the managed-postgresql scheduler is used
    set:
      join_token: "test-token"
      global.postgresql.disabled: true
    asserts:
      - failedTemplate:
          errorMessage: "A Postgres scheduler that reuses the managed state store (scheduler.backend_type: postgresql, postgresql.use_global: true) is incompatible with global.postgresql.disabled: true. Either enable Postgres (global.postgresql.disabled: false), use a dedicated external scheduler DB (postgresql.use_global: false), or switch to scheduler.backend_type: etcd."

  - it: should fail when a dedicated external scheduler DB has no connections
    set:
      join_token: "test-token"
      agent.config.internal_dapr.scheduler.postgresql.use_global: false
    asserts:
      - failedTemplate:
          errorMessage: "scheduler.backend_type: postgresql with postgresql.use_global: false needs at least one entry in scheduler.postgresql.connections."

  - it: should fail when external Postgres state store has no connection (legacy passthrough)
    set:
      join_token: "test-token"
      agent.config.project.default_managed_state_store_type: "postgresql-shared-external"
    asserts:
      - failedTemplate:
          errorMessage: "An external Postgres state store (global.postgresql.create: false, or default_managed_state_store_type: postgresql-shared-external) requires external_postgresql.enabled: true with a connection. Set global.postgresql.external.existing_secret_name (preferred) or the inline connection_string_* fields."

  - it: should fail agent configmap when placement.max_project_count is zero
    set:
      join_token: "test-token"
      agent.config.placement.max_project_count: 0
    asserts:
      - failedTemplate:
          errorMessage: "agent.config.placement.max_project_count must be greater than 0!"

  - it: should fail agent configmap when placement.max_appid_count is zero
    set:
      join_token: "test-token"
      agent.config.placement.max_appid_count: 0
    asserts:
      - failedTemplate:
          errorMessage: "agent.config.placement.max_appid_count must be greater than 0!"

  - it: should fail agent configmap when internal_dapr.ca is set without trust_anchors_config_map_name
    set:
      join_token: "test-token"
      agent.config.internal_dapr.ca.trust_anchors_config_map_name: ""
    asserts:
      - failedTemplate:
          errorMessage: "agent.config.internal_dapr.ca.trust_anchors_config_map_name is required when internal_dapr.ca is configured!"

  - it: should render agent configmap with valid default values
    set:
      join_token: "test-token"
    asserts:
      - isKind:
          of: ConfigMap
