---
#------------------------------------------------------------------------------
# JOIN_TOKEN [REQUIRED unless agent.existingJoinTokenSecret is set]:
# A join token can be obtained by creating a Region in Diagrid Cloud.
# This token is used by the agent to enroll your installation with
# the Cloud control plane. A join token can be regenerated before you
# successfully complete the installation but not after.
#------------------------------------------------------------------------------
join_token: ""
#------------------------------------------------------------------------------
# Global Options
#------------------------------------------------------------------------------
global:
  # Override the name of the chart
  nameOverride: ""
  # Override the full name of the chart+release
  fullnameOverride: ""
  # Artifacts configuration for container images
  image:
    # registry is the global default image registry for all container images in the chart.
    # When set, this overrides all component-specific registry values.
    # This is useful when using a private registry or mirror.
    # Example: "my-registry.example.com" or "gcr.io/my-project"
    registry: ""
    # pullPolicy is the global default image pull policy for all container images.
    # Can be overridden by individual component image.pullPolicy settings.
    # Valid values: Always, IfNotPresent, Never
    pullPolicy: Always
    # imagePullSecrets is a list of secret names for pulling images from private registries.
    # These secrets must exist in the same namespace as the deployed resources.
    # Reference: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
    # Example: [{"name": "my-registry-secret"}]
    imagePullSecrets: []
  # Artifacts configuration for Helm charts
  charts:
    # Registry URL for artifact storage
    # Example: "oci://my-registry.example.com/diagrid/catalyst"
    registry: "oci://public.ecr.aws/diagrid"
    # Basic authentication credentials
    username: ""
    password: ""
    # Certificate-based authentication
    # Inline certificate content (PEM format)
    clientCert: ""
    # Inline private key content (PEM format)
    clientKey: ""
    # Custom CA certificate (PEM format) for self-signed certificates
    customCA: ""
    # Reference to an existing secret containing authentication credentials
    # If provided, inline credentials above will be ignored
    # Expected secret keys:
    #   - username (optional, for basic auth)
    #   - password (optional, for basic auth)
    #   - tls.crt (optional, for cert auth)
    #   - tls.key (optional, for cert auth)
    #   - ca.crt (optional, for custom CA)
    existingSecret: ""
    # Optional: customize the generated secret name
    # secretName: ""
  # Global labels applied to all resources deployed by the chart
  labels: {}
  serviceAccount:
    # Annotations to add to the agent and management service account
    annotations: {}
  # Secrets config for integrating with a secret provider
  secrets:
    # Supported values: kubernetes, aws.secretmanager, postgresql
    provider: kubernetes
    aws:
      # Required aws region to access AWS Secrets Manager
      region: ""
      # Optional, access key and secret key pair to access AWS Secrets Manager
      access_key: ""
      secret_access_key: ""
    postgresql:
      # KEK provider type: "local" (AES-256) or "awskms" (AWS KMS)
      kek_provider: "local"
      # Primary encryption key (64 hex characters for AES-256) — used when kek_provider is "local"
      primary_encryption_key: ""
      primary_key_version: 1
      # Secondary encryption key for key rotation — leave empty if not rotating
      secondary_encryption_key: ""
      secondary_key_version: 0
      # PostgreSQL connection string: postgres://user:pass@host:5432/db
      connection_string: ""
      max_conns: 10
      timeout: "10s"
      # AWS KMS fields — required when kek_provider is "awskms"
      aws_kms_key_id: ""
      aws_region: ""
      aws_access_key: ""
      aws_secret_access_key: ""
      use_aws_iam: false
      aws_assume_role_arn: ""
      # Reference to an existing Kubernetes secret containing PostgreSQL secrets provider configuration.
      # If provided, inline configuration above will be ignored
      existingSecret: ""
      # Key names within the existing secret. All keys are read with optional: true,
      # so missing keys result in the application using its built-in defaults
      # Override any key name if your secret uses different naming.
      existingSecretKeys:
        connection_string: "connection_string"
        kek_provider: "kek_provider"
        primary_encryption_key: "primary_encryption_key"
        primary_key_version: "primary_key_version"
        secondary_encryption_key: "secondary_encryption_key"
        secondary_key_version: "secondary_key_version"
        aws_kms_key_id: "aws_kms_key_id"
        aws_region: "aws_region"
        aws_access_key: "aws_access_key"
        aws_secret_access_key: "aws_secret_access_key"
        use_aws_iam: "use_aws_iam"
        aws_assume_role_arn: "aws_assume_role_arn"
        max_conns: "max_conns"
        timeout: "timeout"
  # Global control plane URL
  control_plane_namespace: controlplane
  control_plane_url: catalyst-cloud.r1.diagrid.io:443
  control_plane_http_url: https://api.r1.diagrid.io
  # Global sentry configuration
  sentry:
    enabled: true
    endpoint: dapr-sentry.root-dapr-system.svc.cluster.local:443
    remote_endpoint: sentry.r1.diagrid.io:443
    remote_namespace: "controlplane"
    trust_anchors_endpoint: https://trust.r1.diagrid.io
    trust_anchors_endpoint_insecure: false
    trust_domain: prj-root.trust.diagrid.io
    namespace: root-dapr-system
    trust_anchors_file: "/var/run/secrets/diagrid.io/trust/ca.crt"
  # Global feature flags
  featureflags: {}
  # Consolidated image allows you to use a single image for
  # all Catalyst components instead of individual images.
  # This can be used when you need to reduce the number of
  # images you need to procure.
  consolidated_image:
    # enabled determines whether to use a single consolidated image for all components
    enabled: true
    # registry is the default registry for the consolidated image.
    # If global.image.registry is set, it will override this value.
    registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
    # repository is the image repository path (without registry or tag).
    # Example: "catalyst-all" or "diagrid/catalyst-all"
    repository: catalyst-all
    # pullPolicy is the image pull policy for the consolidated image
    # If not set, uses global.image.pullPolicy
    pullPolicy: ""
  # waitForDaprConfig controls a per-pod init container that blocks until the
  # Dapr Configuration CR referenced by the pod's `dapr.io/config` annotation
  # exists in the pod's namespace. This avoids dapr-sentry returning
  # PermissionDenied for SVID requests during the bootstrap window when the
  # cra-agent has not yet created the Configuration CR.
  waitForDaprConfig:
    # enabled determines whether the init container is injected
    enabled: true
    # timeoutSeconds caps how long the init container will wait before exiting
    # with an error. The pod is then restarted by kubelet.
    timeoutSeconds: 600
    # pollIntervalSeconds is the polling interval between API server lookups
    pollIntervalSeconds: 2
    image:
      # registry/repository/tag/pullPolicy for the wait init container.
      # Needs an image with `kubectl`. Defaults to the same image used by the
      # cleanup hook, pulled through the DockerHub proxy to avoid rate limits.
      registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-hub-proxy
      repository: alpine/k8s
      tag: "1.28.3"
      pullPolicy: IfNotPresent
    # resources for the init container — small footprint, polls only.
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    # securityContext for the init container. The host pods set
    # runAsNonRoot: true at the pod level, and the alpine/k8s image runs as
    # root by default — overriding runAsUser here keeps the init container
    # compliant with the restricted Pod Security Standard.
    securityContext:
      runAsUser: 65532
      runAsGroup: 65532
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault
#------------------------------------------------------------------------------
# Shared Scheduling Defaults
#
# Applied to every pod Catalyst runs or provisions:
#
#   - Control-plane pods rendered by this chart: agent, management,
#     gateway.envoy, gateway.controlplane, piko.
#   - Dapr sidecars the agent provisions per app (see agent.config.sidecar).
#   - Per-project Dapr control-plane pods (agent.config.internal_dapr).
#   - Per-project OTel collectors (agent.config.otel).
#
# Per-workload overrides take precedence on key collision for nodeSelector/
# affinity; per-workload tolerations are appended to shared.tolerations.
#
# See the "Pod Scheduling" section in README.md for the full picture.
#------------------------------------------------------------------------------
shared:
  scheduling:
    # nodeSelector applied to all Catalyst pods unless overridden per workload.
    nodeSelector: {}
    # tolerations applied to all Catalyst pods; per-workload tolerations are appended.
    tolerations: []
    # affinity applied to all Catalyst pods unless overridden per workload.
    affinity: {}
#------------------------------------------------------------------------------
# Agent Configurations
#------------------------------------------------------------------------------
agent:
  # existingJoinTokenSecret references a pre-created Kubernetes Secret
  # containing the join token. When set, join_token value is not required.
  # The Secret must exist in the same namespace as the Helm release.
  existingJoinTokenSecret:
    name: ""
    key: "join_token"
  logLevel: info
  # This agent config is read directly into the ConfigMap. However,
  # we do apply templating which allows us to provide inline
  # templates in the values.
  config:
    host:
      private_region: true
      egress_addresses: []
      ingress:
        ip_addr: ""
        port: 443
        service:
          namespace: ""
          name: ""
        tls:
          secret:
            # Name of the Kubernetes secret containing the ingress gateway TLS certificate.
            # Automatically derived from gateway.tls settings when not set explicitly.
            name: ""
            # Key within the secret that holds the CA certificate PEM.
            # Only needed when the gateway TLS certificate is signed by a
            # private/internal CA. When using a well-known CA (e.g. Let's Encrypt)
            # this can be left empty and no CA will be distributed to sidecars.
            # Defaults to "ca.crt" when set.
            ca_file: ""
    placement:
      # max_project_count configures the maximum number of projects that can be handled by the agent.
      # this is a limit internal to this catalyst installation that helps prevent resource exhaustion.
      max_project_count: 50
      # max_appid_count configures the maximum number of appids that can be handled by the agent.
      # this is a limit internal to this catalyst installation that helps prevent resource exhaustion.
      max_appid_count: 300
    project:
      # disable_network_policies disables all Kubernetes NetworkPolicy resources for project namespaces.
      # When true, no network policies are created and any previously created policies are removed on the next reconcile.
      disable_network_policies: false
      # blocked_egress denies network destinations from the sidecar 0.0.0.0/0
      # egress rule. Each rule's CIDRs are flattened into the NetworkPolicy
      # IPBlock.except list — NetworkPolicy's "except" only supports CIDRs, so
      # rules here may only contain cidrs (no namespaces, no ports). Defaults
      # cover RFC1918 private ranges and the link-local range (169.254.0.0/16),
      # which includes cloud instance metadata endpoints. Trim or override to
      # match your environment (e.g. GKE/AKS pod CIDRs live in 10.0.0.0/8).
      #
      # PRECEDENCE: allowed_egress always beats blocked_egress. NetworkPolicy
      # rules are additive, so any destination matched by an allowed_egress
      # entry is reachable even if its CIDR also appears here.
      blocked_egress:
        # RFC1918 private address space. Blocking these by default prevents
        # sidecars from reaching internal corporate networks, other tenants'
        # workloads, and in-cluster services that have not been explicitly
        # allow-listed via allowed_egress. Note that many managed Kubernetes
        # offerings (GKE, AKS, EKS) place pod and node CIDRs inside 10.0.0.0/8,
        # so operators typically need to either trim this entry or add an
        # allowed_egress rule for the cluster's pod/service CIDRs.
        - name: rfc1918
          cidrs:
            - "10.0.0.0/8" # RFC1918 — large private network (most cloud VPC/pod CIDRs)
            - "172.16.0.0/12" # RFC1918 — medium private network (Docker default bridge)
            - "192.168.0.0/16" # RFC1918 — small private network (home/office LANs)
        # Link-local range (RFC3927). The critical reason to block this is
        # 169.254.169.254, the cloud instance metadata service (IMDS) used by
        # AWS, GCP, and Azure. An unblocked sidecar could exfiltrate IAM
        # credentials, instance identity documents, or user-data secrets via
        # SSRF-style attacks against the node's metadata endpoint.
        - name: link-local
          cidrs:
            - "169.254.0.0/16"
      # allowed_egress is an additive list of egress destinations permitted
      # from sidecars. Each rule may combine cidrs and namespaces, and may be
      # scoped to specific ports. Use this to reach internal services such as
      # RDS, MSK, or workloads in other namespaces — allow rules win over
      # blocked_egress so you can punch narrow holes through the block list.
      #
      # Example:
      #   allowed_egress:
      #     - name: rds
      #       cidrs: ["10.4.5.6/32"]
      #       ports:
      #         - port: 5432
      #           protocol: TCP
      #     - name: msk
      #       cidrs: ["10.4.5.0/24"]
      #       ports:
      #         - port: 9094
      #           protocol: TCP
      #     - name: worker-namespace
      #       namespaces: ["my-workers"]
      #       ports:
      #         - port: 8080
      #           protocol: TCP
      allowed_egress: []
      # allowed_ingress is an additive list of ingress sources permitted into
      # project namespaces. Each rule may combine cidrs and namespaces, and may
      # be scoped to specific ports. The agent namespace (cra-agent) and the
      # monitoring namespace are always permitted implicitly — you do not need
      # to list them here.
      #
      # Example:
      #   allowed_ingress:
      #     - name: extra-prom
      #       namespaces: ["observability"]
      #       ports:
      #         - port: 9090
      #           protocol: TCP
      allowed_ingress: []
      default_managed_pubsub_type: kafka-shared-disabled
      default_managed_state_store_type: postgresql-shared-disabled
      default_workflow: namespace
      # sidecar_operations_worker_pool_max_appids_percentage configures a worker pool for operations that deploy appids
      # sidecar operations worker pool capacity will be equal to placement.max_appid_count
      # sidecar operations worker pool max workers will be determined by a percentage of placement.max_appid_count
      # sidecar_operations_worker_pool_max_appids_percentage controls how many appis are deployed at a time.
      # setting it to 1.0 means that all appids could be deployed at the same time, which might cause resource exhaustion.
      # setting it to 0.10 means that at most 300 * 0.10 = 30 appids will be deployed at the same time, which provides a balance between deployment speed and resource usage spikes.
      sidecar_operations_worker_pool_max_appids_percentage: "0.10"
    sidecar:
      # Scheduling overrides for Dapr sidecars (merged with top-level shared.*).
      # node_selector/affinity override shared on key collision; tolerations
      # are appended to shared.tolerations and to any platform-managed
      # tolerations (e.g. the free-plan spot toleration).
      # NOTE: affinity, when set, replaces the cra chart's default pod
      # anti-affinity block wholesale. Include your own anti-affinity if needed.
      node_selector: {}
      tolerations: []
      affinity: {}
      # default to disable API validation because ingress could be not configured by users
      skip_api_validation: true
      # image_registry is the registry for the sidecar image.
      # If global.image.registry is set, it will be used instead.
      image_registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
      # image_name is the image name within the registry.
      # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
      image_name: "{{ ternary .Values.global.consolidated_image.repository \"sidecar\" .Values.global.consolidated_image.enabled }}"
      # image_tag is the sidecar image version
      image_tag: "1.51.0"
      resources:
        limits:
          cpu: 300m
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 25Mi
      service_account_annotations: []
    otel:
      enabled: true
      # Scheduling overrides for the metrics (Deployment) and logs (DaemonSet)
      # otel collectors the agent provisions. Merged with top-level shared.*.
      node_selector: {}
      tolerations: []
      affinity: {}
      # image_registry is the registry for the otel collector image.
      # If global.image.registry is set, it will be used instead.
      image_registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
      # image_name is the image name within the registry.
      # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
      image_name: "{{ ternary .Values.global.consolidated_image.repository \"catalyst-otel-collector\" .Values.global.consolidated_image.enabled }}"
      # image_tag is the otel collector image version
      image_tag: "1.51.0"
      image_pull_policy: "Always"
      metrics_endpoint: https://catalyst-metrics.r1.diagrid.io/api/v1/push
      loki_endpoint: https://catalyst-logs.r1.diagrid.io/loki/api/v1/push
      metrics_tls_insecure: false
      loki_tls_insecure: false
      internal_cortex_enabled: false
      internal_cortex_endpoint: ""
      internal_cortex_org_id: common
      loki_enabled: true
      logs_resources:
        limits:
          memory: 750Mi
        requests:
          cpu: 50m
          memory: 500Mi
      metrics_resources:
        limits:
          memory: 1100Mi
        requests:
          cpu: 75m
          memory: 500Mi
    internal_dapr:
      # Scheduling overrides for per-project Dapr control-plane pods (sentry,
      # scheduler, operator, placement). Merged with top-level shared.* and
      # propagated via global.{nodeSelector,tolerations,affinity} on the Dapr Helm chart.
      node_selector: {}
      tolerations: []
      affinity: {}
      # container_registry is the registry for internal Diagrid Dapr images.
      # If global.image.registry is set, it will be used instead.
      container_registry: us-central1-docker.pkg.dev/prj-common-d-shared-89549/reg-d-common-docker-public
      sentry_resources:
        limits:
          memory: 100Mi
      scheduler_resources:
        limits:
          memory: 175Mi
        requests:
          memory: 130Mi
      scheduler:
        # storage_class: ""
        storage_size: 8Gi
      sentry:
        image:
          registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
          # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
          name: "{{ ternary .Values.global.consolidated_image.repository \"private-sentry\" .Values.global.consolidated_image.enabled }}"
          tag: "1.51.0"
        jwt:
          enabled: true
          # managed means agent automatically does key rotation and JWKS updates.
          # If false, users need to manage the JWT keys and provide an apropriately configured secret,
          # ie a `jwks.json` field containing the supported public keys and an `issue.key` field
          # containing the signing key.
          managed: true
          secret_name: "jwt-signing-keys"
          key_filename: "jwt.key"
          jwks_filename: "jwks.json"
        oidc:
          enabled: true
    kubernetes:
      qps: 25
      burst: 10
    denylist:
      enabled: false
    featureflags: {}
    # Sandbox feature configuration.
    sandbox:
      enabled: false
      # provider names the isolation backend. Today only "gvisor" is
      # supported; a future Kata or firecracker Provider would slot in
      # here.
      provider: gvisor
      gvisor:
        # Kubernetes RuntimeClass installed in the cluster.
        # MUST match the name installed by the gvisor-runtime DaemonSet.
        runtime_class_name: gvisor
        identity_injector:
          # REQUIRED when sandbox.enabled. Full image reference for
          # the identity-injector sidecar (the SPIFFE-helper that
          # exchanges SA tokens for SVIDs).
          image: ""
          pull_policy: IfNotPresent
        # Profiles MUST contain every name in provider.RequiredProfiles.
        profiles:
          - name: "cra.diagrid.io/v1beta1/DurableAgent/default"
            # REQUIRED when sandbox.enabled.
            guest_image: ""
            pull_policy: IfNotPresent
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"
            network_policy:
              # Empty falls back to "<sandboxName>-agent" (matches the
              # AppIdentity pod label the agent stamps).
              agent_pod_label_key: app
              agent_pod_label_value: ""
              # Egress blocklist. The default — only the cloud metadata
              # IMDS endpoint — is the agent's compiled default; do NOT
              # add RFC1918 CIDRs (10/8, 172.16/12, 192.168/16) without
              # checking your cluster: K8s pod and service CIDRs are
              # typically inside RFC1918, and blocking them prevents
              # the sandbox from reaching Sentry / kube-dns / the
              # control plane and the init container deadline-fires.
              blocked_egress_cidrs:
                - "169.254.169.254/32"
              # Off by default: sandboxes reach the in-cluster control
              # plane (Sentry, kube-dns, internal services) but not
              # the public internet. Opt-in per profile when the
              # workflow genuinely needs outbound (pip install, git
              # clone, …) and audit the egress posture explicitly.
              allow_public_internet: false
  metrics:
    port: 9090
  replicaCount: 1
  image:
    # registry is the container registry for the agent image.
    # If global.image.registry is set, it will override this value.
    # Example: "us-central1-docker.pkg.dev/my-project/my-repo"
    registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
    # repository is the image name/path within the registry (without registry prefix or tag).
    # Example: "diagrid/cra-agent" or "cra-agent"
    repository: cra-agent
    # tag is the image tag/version to use
    tag: "1.51.0"
    # pullPolicy is the image pull policy for this specific image.
    # If empty, uses global.image.pullPolicy.
    # Valid values: Always, IfNotPresent, Never
    pullPolicy: ""
  nameOverride: ""
  fullnameOverride: ""
  service:
    type: ClusterIP
    port: 9090
  serviceAccount:
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  podAnnotations:
    prometheus.io/port: "9090"
    prometheus.io/scrape: "true"
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # readOnlyRootFilesystem: true
  # runAsUser: 1000

  resources:
    limits:
      memory: 1200Mi
    requests:
      cpu: 40m
      memory: 500Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Golang Soft Memory Limit via env var GOMEMLIMIT
  goSoftLimit:
    percent: 90
  #  override: 600MiB  # it will set GOMEMLIMIT to this value. Supported suffixes, if not using a straight bytes number, are B, KiB, MiB, GiB, and TiB.

  extraEnvs: []
  merge: {}
  patch: {}
#------------------------------------------------------------------------------
# Gateway Configuration
#------------------------------------------------------------------------------
gateway:
  tls:
    enabled: false
    # Name of a previously created secret containing TLS certificates
    existingSecret: ""
    # TLS certificate configuration
    certificates:
      # Name of the TLS certificate file in the secret
      certFile: "tls.crt"
      # Name of the TLS key file in the secret
      keyFile: "tls.key"
      # Optional: Name of the CA certificate file in the secret for client certificate validation
      caFile: ""
    # Optional: customize the generated secret name
    # secretName: ""
    #
    # Inline TLS certificate and key (used if existingSecret is not provided)
    cert: ""
    key: ""
  # Enable High Availability mode for gateway components
  ha:
    enabled: false
    # Minimum number of replicas when HA is enabled
    minReplicas: 2
  identityInjector:
    image:
      # registry is the container registry for the identity injector image.
      # If global.image.registry is set, it will override this value.
      registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
      # repository is the image name/path within the registry.
      # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
      repository: identity-injector
      # tag is the image tag/version to use
      tag: "1.51.0"
      # pullPolicy is the image pull policy for this specific image.
      # If empty, uses global.image.pullPolicy.
      pullPolicy: ""
    resources:
      limits:
        cpu: 200m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
  envoy:
    # If HA is enabled, this will be overridden by gateway.ha.minReplicas.
    # When autoscaling.enabled is true, this field is ignored and the HPA manages replicas.
    replicaCount: 1
    # Optional HorizontalPodAutoscaler for the gateway Envoy data plane.
    # When enabled, the Deployment's replicas field is omitted so the HPA owns it.
    autoscaling:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      # At least one of targetCPUUtilizationPercentage or targetMemoryUtilizationPercentage must be set.
      targetCPUUtilizationPercentage: 80
      # targetMemoryUtilizationPercentage: 80
      # Optional HPA scaling behavior — see k8s HPA v2 behavior spec.
      behavior: {}
    image:
      # registry is the container registry for the Envoy proxy image.
      # If global.image.registry is set, it will override this value.
      # This uses a DockerHub proxy to avoid rate limits
      registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-hub-proxy
      # repository is the image name/path within the registry.
      repository: envoyproxy/envoy
      # tag is the image tag/version to use
      tag: distroless-v1.33.0
      # pullPolicy is the image pull policy for this specific image.
      # If empty, uses global.image.pullPolicy.
      pullPolicy: ""
    admin:
      enabled: true
      address: "127.0.0.1"
      port: 9090
    serviceAccount:
