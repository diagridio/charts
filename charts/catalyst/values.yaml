      annotations: {}
    configmap:
      name: envoy-config
    service:
      name: gateway-envoy
      appLabel: envoy
      port: 8080
      targetPort: 8080
      # HTTPS port configuration
      httpsPort: 8443
      httpsTargetPort: 8443
      type: ClusterIP
    xds:
      connect_timeout: 10s
      health_check:
        timeout: 5s
        interval: 15s
        unhealthy_threshold: 2
        healthy_threshold: 1
        path: /healthz
        port: 57205
      connection_keepalive:
        interval: 30s
        timeout: 10s
      hostname: gateway-controlplane
      port: 57206
    podAnnotations: {}
    labels:
      app: gateway-envoy
    selectorLabels:
      app: gateway-envoy
    merge:
      labels: {}
      selectorLabels: {}
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
    nodeSelector: {}
    affinity: {}
    tolerations: []
    resources:
      limits:
        cpu: 1000m
        memory: 2048Mi
      requests:
        cpu: 100m
        memory: 512Mi
  controlplane:
    # If HA is enabled, this will be overridden by gateway.ha.minReplicas
    replicaCount: 1
    xds:
      mtls:
        enabled: true
    image:
      # registry is the container registry for the gateway control plane image.
      # If global.image.registry is set, it will override this value.
      registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
      # repository is the image name/path within the registry.
      # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
      repository: catalyst-gateway
      # tag is the image tag/version to use
      tag: "1.51.0"
      # pullPolicy is the image pull policy for this specific image.
      # If empty, uses global.image.pullPolicy.
      pullPolicy: ""
    serviceAccount:
      name: gateway-controlplane
      annotations: {}
    deployment:
      httpHealthCheck:
        containerPort: 57205
      httpXDS:
        containerPort: 57206
    service:
      name: gateway-controlplane
      appLabel: gateway-controlplane
      httpHealthCheck:
        port: 57205
        targetPort: 57205
      httpXDS:
        port: 57206
        targetPort: 57206
      type: ClusterIP
      clusterIP: None
    podAnnotations: {}
    labels:
      app: gateway-controlplane
    selectorLabels:
      app: gateway-controlplane
    merge:
      labels: {}
      selectorLabels: {}
    podSecurityContext:
      runAsNonRoot: true
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
    nodeSelector: {}
    affinity: {}
    tolerations: []
    resources:
      limits:
        cpu: 100m
        memory: 100Mi
      requests:
        cpu: 50m
        memory: 50Mi
    config: {}
#------------------------------------------------------------------------------
# Management Service Configurations
#------------------------------------------------------------------------------
management:
  logLevel: info
  # This agent mangement is read directly into the ConfigMap. However,
  # we do apply templating which allows us to provide inline
  # templates in the values.
  config:
    http_server:
      enabled: true
      port: 8181
    http_server_auth:
      enabled: true
    grpc_server:
      enabled: false
    profiling:
      enabled: false
    featureflags: {}
  # When autoscaling.enabled is true, this field is ignored and the HPA manages replicas.
  replicaCount: 2
  # Optional HorizontalPodAutoscaler for the management service.
  # When enabled, the Deployment's replicas field is omitted so the HPA owns it.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    # At least one of targetCPUUtilizationPercentage or targetMemoryUtilizationPercentage must be set.
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80
    # Optional HPA scaling behavior — see k8s HPA v2 behavior spec.
    behavior: {}
  image:
    # registry is the container registry for the management image.
    # If global.image.registry is set, it will override this value.
    registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
    # repository is the image name/path within the registry (without registry prefix or tag).
    # When consolidated_image.enabled is true, uses consolidated_image.repository instead.
    # Deprecated: This field supports template evaluation for backwards compatibility.
    repository: "{{ ternary .Values.global.consolidated_image.repository \"catalyst-management\" .Values.global.consolidated_image.enabled }}"
    # tag is the image tag/version to use
    tag: "1.51.0"
    # pullPolicy is the image pull policy for this specific image.
    # If empty, uses global.image.pullPolicy.
    pullPolicy: ""
  nameOverride: ""
  fullnameOverride: ""
  service:
    type: ClusterIP
    port: 50005
  http_service:
    type: ClusterIP
    port: 8181
  metrics_service:
    port: 9091
  ingress:
    enabled: false
    dns_top_level_domain: ""
  serviceAccount:
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  podAnnotations:
    prometheus.io/port: "9091"
    prometheus.io/scrape: "true"
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  # fsGroup: 2000

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  # readOnlyRootFilesystem: true
  # runAsUser: 1000

  resources:
    limits:
      memory: 1200Mi
    requests:
      cpu: 40m
      memory: 100Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Golang Soft Memory Limit via env var GOMEMLIMIT
  goSoftLimit:
    percent: 90
  #  override: 600MiB  # it will set GOMEMLIMIT to this value. Supported suffixes, if not using a straight bytes number, are B, KiB, MiB, GiB, and TiB.

  extraEnvs: []
  merge: {}
  patch: {}
#------------------------------------------------------------------------------
# Piko Configurations
#------------------------------------------------------------------------------
piko:
  enabled: true
  replicaCount: 1
  pikoName: "piko"
  releaseName: "diagrid-piko"
  # Sets the configmap name and the key in the config map
  # that contains the public key to validate the JWT.
  publicToken:
    url: http://dapr-sentry.root-dapr-system.svc.cluster.local:9080/jwks.json
    cacheTTL: "5m"
  image:
    # registry is the container registry for the Piko image.
    # If global.image.registry is set, it will override this value.
    registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-public
    # repository is the image name/path within the registry.
    repository: diagrid-piko
    # tag is the image tag/version to use
    tag: "v1.0.0"
    # pullPolicy is the image pull policy for this specific image.
    # If empty, uses global.image.pullPolicy.
    pullPolicy: IfNotPresent
  serviceAccount:
    annotations: {}
    name: "diagrid-piko"
  podAnnotations: {}
  podLabels: {}
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
  server:
    # -- Specifies the proxy port to listen on. The proxy port listens for
    # requests that are forwarded to upstream services.
    proxyPort: 8000
    # -- Specifies the upstream port to listen on. The upstream port listens
    # for connections from upstream service.
    upstreamPort: 8001
    # -- Specifies the admin port to listen on. The admin port exposes an API for
    # metrics and observability.
    adminPort: 8002
    # -- Specifies the gossip port for inter-node traffic.
    gossipPort: 8003
  certificates:
    # Currently the internal proxy TLS is not supported because the
    # public key comes from the shared control plane and it's not
    # configurable.
    proxy:
      enabled: false
      secretName: ""
  terminationGracePeriodSeconds: 60
  readinessProbe:
    httpGet:
      path: /ready
      port: admin
  # Scheduling for Piko pods. Merged with shared.* defaults (per-component wins
  # for nodeSelector/affinity; tolerations are appended to shared.tolerations).
  nodeSelector: {}
  tolerations: []
  affinity: {}
  httpproxy:
    # TODO configure this for every environment.
    upstreamHostName: "tunnels.api.diagrid.io"
# OpenTelemetry Deployment Collector (Optional) - For Traces and Metrics
#------------------------------------------------------------------------------
# This collector runs as a deployment to handle service-level telemetry
# that is not tied to individual nodes. This avoids the collector doing
# duplicate scraping when used with Prometheus.
opentelemetry-deployment:
  # Set to true to enable traces and metrics collection
  enabled: false
  mode: deployment
  # Scheduling (passed through to the upstream open-telemetry helm subchart).
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Scale horizontally for high availability
  replicaCount: 1
  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    pullPolicy: IfNotPresent
  command:
    name: otelcol-k8s
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # OpenTelemetry Collector configuration
  # Customize receivers, processors, exporters, and pipelines as needed
  config:
    receivers:
      # OTLP receiver listens for telemetry from applications
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
      # Zipkin receiver for compatibility with Zipkin instrumentation
      zipkin:
        endpoint: ${env:MY_POD_IP}:9411
      # Prometheus receiver scrapes metrics from Kubernetes service endpoints
      prometheus:
        config:
          scrape_configs:
            # Scrape pods with prometheus.io annotations
            - job_name: 'kubernetes-pods'
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                # Only scrape pods with prometheus.io/scrape=true annotation
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                # Use the prometheus.io/path annotation or default to /metrics
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # Use the prometheus.io/port annotation or default to the pod port
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                # Add pod metadata as labels
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: kubernetes_pod_name
            # Scrape services with prometheus.io annotations
            - job_name: 'kubernetes-services'
              kubernetes_sd_configs:
                - role: service
              relabel_configs:
                # Only scrape services with prometheus.io/scrape=true annotation
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                # Use the prometheus.io/path annotation or default to /metrics
                - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                # Use the prometheus.io/port annotation or default to the service port
                - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $1:$2
                  target_label: __address__
                # Add service metadata as labels
                - action: labelmap
                  regex: __meta_kubernetes_service_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels: [__meta_kubernetes_service_name]
                  action: replace
                  target_label: kubernetes_service_name
    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
    exporters:
      # Default: Debug exporter for development (writes to stdout)
      # REPLACE THIS with your production backend
      debug:
        verbosity: detailed
        # Example: Send to an OTLP-compatible backend
        # otlphttp:
        #   endpoint: "https://your-backend.example.com"
        #   headers:
        #     api-key: "${env:OTEL_EXPORTER_API_KEY}"
    # Example: Send metrics to Prometheus Remote Write
    # prometheusremotewrite:
    #   endpoint: "https://prometheus.example.com/api/v1/write"
    #   headers:
    #     Authorization: "Bearer ${env:PROMETHEUS_API_KEY}"

    service:
      pipelines:
        # Traces pipeline
        traces:
          receivers: [otlp, zipkin]
          processors: [memory_limiter, batch]
          exporters: [debug] # REPLACE: Change to your traces backend
        # Metrics pipeline
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [debug] # REPLACE: Change to your metrics backend
  service:
    type: ClusterIP
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP
    zipkin:
      enabled: true
      containerPort: 9411
      servicePort: 9411
      protocol: TCP
  presets:
    kubernetesAttributes:
      enabled: true
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"
  serviceAccount:
    create: true
#------------------------------------------------------------------------------
# OpenTelemetry DaemonSet Collector (Optional) - For Logs
#------------------------------------------------------------------------------
# This collector runs as a DaemonSet to collect logs from each node's filesystem.
# This ensures comprehensive log collection across the cluster.
opentelemetry-daemonset:
  # Set to true to enable logs collection from all nodes
  enabled: false
  mode: daemonset
  # Scheduling (passed through to the upstream open-telemetry helm subchart).
  # NOTE: being a DaemonSet, nodeSelector/affinity restrict which nodes it
  # runs on; tolerations may be necessary if the cluster has tainted nodes.
  nodeSelector: {}
  tolerations: []
  affinity: {}
  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
    pullPolicy: IfNotPresent
  command:
    name: otelcol-k8s
  # Resources per node (each node runs one collector pod)
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # OpenTelemetry Collector configuration for logs
  # Customize receivers, processors, exporters, and pipelines as needed
  config:
    receivers:
      # OTLP receiver (optional, for application-sent logs)
      otlp:
        protocols:
          grpc:
            endpoint: ${env:MY_POD_IP}:4317
          http:
            endpoint: ${env:MY_POD_IP}:4318
    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
    exporters:
      # Default: Debug exporter for development (writes to stdout)
      # REPLACE THIS with your production logs backend
      debug:
        verbosity: detailed
        # Example: Send logs to Loki
        # loki:
        #   endpoint: "https://loki.example.com/loki/api/v1/push"
        #   headers:
        #     X-Scope-OrgID: "tenant-id"
    # Example: Send to an OTLP-compatible backend
    # otlphttp:
    #   endpoint: "https://your-backend.example.com"
    #   headers:
    #     api-key: "${env:OTEL_EXPORTER_API_KEY}"

    service:
      pipelines:
        # Logs pipeline - collects from local node filesystems
        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [debug] # REPLACE: Change to your logs backend
  ports:
    otlp:
      enabled: true
      containerPort: 4317
      servicePort: 4317
      protocol: TCP
    otlp-http:
      enabled: true
      containerPort: 4318
      servicePort: 4318
      protocol: TCP
    metrics:
      enabled: true
      containerPort: 8888
      servicePort: 8888
      protocol: TCP
    health-check:
      enabled: true
      containerPort: 13133
      servicePort: 13133
      protocol: TCP
  presets:
    kubernetesAttributes:
      enabled: true
    logsCollection:
      enabled: true
      includeCollectorLogs: false
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8888"
  serviceAccount:
    create: true
#------------------------------------------------------------------------------
# Cleanup Hook Configuration
#------------------------------------------------------------------------------
# Post-delete hook that cleans up resources created by Catalyst
cleanup:
  # enabled determines whether to run the cleanup hook after helm uninstall
  enabled: true
  # ttlSecondsAfterFinished is the TTL for the cleanup job after it finishes
  ttlSecondsAfterFinished: 300
  # namespaces that are created by Catalyst at runtime and should be cleaned up
  namespaces:
    # dapr is the namespace where internal Dapr components are installed
    dapr: "root-dapr-system"
  image:
    # registry is the container registry for the cleanup job image
    # The cleanup job needs both kubectl and helm CLI tools.
    # Pulled through the DockerHub proxy to avoid rate limits.
    registry: us-central1-docker.pkg.dev/prj-common-p-shared-79896/reg-p-common-docker-hub-proxy
    # repository is the image repository path
    repository: alpine/k8s
    # tag is the image tag/version
    tag: "1.28.3"
    # pullPolicy is the image pull policy
    pullPolicy: IfNotPresent
