# patches.yaml — declarative yq edits applied AFTER set_helm_dapr_version.sh.
#
# These patches are intentionally minimal: the Diagrid Dapr fork's own
# (github.com/diagridio/dapr-dapr) .github/scripts/set_helm_dapr_version.sh
# syncs Chart.yaml .version,
# .appVersion, and sub-chart dep versions from REL_VERSION. Patches only
# need to do what that script does NOT do.
#
# Variables available to ops via yq's strenv() (exported by publish.sh
# before each `yq -i`):
#   CHART_NAME      — always "catalyst-dapr-chart"
#   CHART_REGISTRY  — "${REGISTRY}/${REPO}" e.g.
#                     709825985650.dkr.ecr.us-east-1.amazonaws.com/diagrid
#   IMAGE_TAG       — catalyst-dapr container tag, e.g.
#                     1.17.5-catalyst.5-multi (INDEPENDENT of chart version)
#
patches:
  - file: charts/dapr/Chart.yaml
    ops:
      - '.name = strenv(CHART_NAME)'
  - file: charts/dapr/values.yaml
    ops:
      - '.global.registry = strenv(CHART_REGISTRY)'
      - '.global.tag = strenv(IMAGE_TAG)'
